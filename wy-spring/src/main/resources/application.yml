spring:
  application:
    name: wy-spring

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/wy_edu?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: phq517762
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000

  # Redis（短信验证码、滑动校验 token 等依赖 Redis）
  # 本地默认无密码；若你的 Redis 设置了 requirepass，请设置环境变量 REDIS_PASSWORD 或取消下行注释
  redis:
    host: localhost
    port: 6379
    password: ${REDIS_PASSWORD:}
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

# 服务器配置
server:
  port: 8080

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: org.example.wyspring.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto

# 百度 OCR — 本地可设环境变量：BAIDU_OCR_ENABLED=true BAIDU_OCR_API_KEY=... BAIDU_OCR_SECRET_KEY=...
# https://console.bce.baidu.com/ai/
baidu:
  ocr:
    enabled: ${BAIDU_OCR_ENABLED:false}
    api-key: ${BAIDU_OCR_API_KEY:}
    secret-key: ${BAIDU_OCR_SECRET_KEY:}

# JWT配置
jwt:
  secret: wy-spring-jwt-secret-key-2026
  expiration: 86400000  # 24小时

# 短信登录：mock=true 时验证码只打日志，需 Redis；生产接短信网关后改 mock-enabled 并实现发送逻辑
app:
  sms:
    mock-enabled: true
    # 开发固定验证码（与发码写入 Redis 的值一致）；上线请删除本行或置空
    fixed-code: "123456"
    code-ttl-seconds: 300
    resend-interval-seconds: 60
    daily-limit-per-phone: 10
    gate-token-ttl-seconds: 120
    slide-session-ttl-seconds: 300

# 日志配置
logging:
  level:
    org.example.wyspring: debug
    org.springframework.security: debug
